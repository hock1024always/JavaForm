server:
  port: 8084

spring:
  application:
    name: zx-logservice
  profiles:
    active: dev

  # Nacos配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yaml

  # ClickHouse数据源配置
  datasource:
    url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DATABASE:http_log_db}
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
    username: ${CLICKHOUSE_USER:default}
    password: ${CLICKHOUSE_PASSWORD:}

# MyBatis Plus配置
mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      update-strategy: not_null

# Knife4j API文档
knife4j:
  enable: true
  openapi:
    title: 日志服务API
    description: HTTP日志收集、统计分析相关接口
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.homework.zx_logservice.controller

# 日志配置
logging:
  level:
    com.zxzy: debug
    com.homework: debug
    org.springframework: info
